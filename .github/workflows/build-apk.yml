name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Agregar Android
        run: |
          if [ ! -f "android/build.gradle" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copiar íconos
        run: |
          ICON=www/assets/icon-512.png
          ICON192=www/assets/icon-192.png
          # Directorios mipmap de Android
          for DIR in android/app/src/main/res/mipmap-mdpi \
                     android/app/src/main/res/mipmap-hdpi \
                     android/app/src/main/res/mipmap-xhdpi \
                     android/app/src/main/res/mipmap-xxhdpi \
                     android/app/src/main/res/mipmap-xxxhdpi; do
            mkdir -p $DIR
            cp $ICON $DIR/ic_launcher.png
            cp $ICON $DIR/ic_launcher_round.png
            cp $ICON192 $DIR/ic_launcher_foreground.png
          done

      - name: Permisos Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: SENSIS-GOOD-FF-v3.2.${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.2.${{ github.run_number }}
          name: "SENSIS GOOD FF v3.2.${{ github.run_number }}"
          body: |
            ## SENSIS GOOD FF ⚡☠️
            - Acceso verificado 2 pasos 🔐
            - Calibración por resolución y Hz 📱
            - Headshot todo rojo 🔴
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
